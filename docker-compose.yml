services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam-practice-backend
    ports:
      - "8080:8080"
    environment:
      - APPLICATION_NAME=exam-practice
      - DATASOURCE_URL=jdbc:sqlite:/data/database.db
      - DATASOURCE-DRIVER-CLASS-NAME=org.sqlite.JDBC
    volumes:
      - ./database.db:/data/database.db